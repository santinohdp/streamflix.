<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fenix TV — Panel MAC</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@400;600;700&family=Share+Tech+Mono&display=swap');

  :root {
    --fire1: #FF6B00; --fire2: #CC2200; --fire3: #FFB300;
    --dark: #080510; --card: rgba(255,107,0,0.06);
    --border: rgba(255,107,0,0.25); --text: #E8E0D0; --muted: #7A6A5A;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background: var(--dark); color: var(--text);
    font-family: 'Rajdhani', sans-serif; min-height:100vh;
  }
  body::before {
    content:''; position:fixed; inset:0; pointer-events:none; z-index:0;
    background:
      radial-gradient(ellipse 80% 50% at 50% 100%, rgba(204,34,0,0.18) 0%, transparent 70%),
      radial-gradient(ellipse 40% 30% at 20% 80%, rgba(255,107,0,0.1) 0%, transparent 60%);
  }
  body::after {
    content:''; position:fixed; inset:0; pointer-events:none; z-index:0;
    background-image: linear-gradient(rgba(255,107,0,0.03) 1px,transparent 1px),
      linear-gradient(90deg,rgba(255,107,0,0.03) 1px,transparent 1px);
    background-size:40px 40px;
  }
  .wrap { position:relative; z-index:1; max-width:820px; margin:0 auto; padding:40px 24px 80px; }

  header { text-align:center; margin-bottom:44px; }
  h1 {
    font-family:'Bebas Neue',sans-serif; font-size:52px; letter-spacing:6px;
    background:linear-gradient(90deg,var(--fire1),var(--fire3),var(--fire1));
    background-clip:text; -webkit-background-clip:text; -webkit-text-fill-color:transparent;
    background-size:200% auto; animation:shimmer 3s linear infinite;
  }
  @keyframes shimmer { to { background-position:200% center; } }
  .subtitle { color:var(--muted); font-size:13px; letter-spacing:4px; margin-top:4px; }

  /* Admin key */
  .admin-bar {
    display:flex; gap:10px; margin-bottom:32px; align-items:center;
    background:var(--card); border:1px solid var(--border); border-radius:14px; padding:14px 18px;
  }
  .admin-bar label { color:var(--muted); font-size:13px; letter-spacing:2px; white-space:nowrap; }
  .admin-bar input { flex:1; }

  .section-title {
    font-family:'Bebas Neue',sans-serif; font-size:22px; letter-spacing:4px;
    color:var(--fire1); margin-bottom:14px;
    display:flex; align-items:center; gap:10px;
  }
  .section-title::after { content:''; flex:1; height:1px; background:linear-gradient(90deg,var(--border),transparent); }

  /* Form */
  .form-card {
    background:var(--card); border:1px solid var(--border);
    border-radius:18px; padding:26px; margin-bottom:32px;
  }
  .fields { display:grid; grid-template-columns:160px 1fr; gap:12px; margin-bottom:14px; }
  @media(max-width:580px){ .fields { grid-template-columns:1fr; } }

  input[type="text"], input[type="password"] {
    width:100%; background:rgba(0,0,0,0.45); border:1px solid var(--border);
    border-radius:10px; padding:12px 15px; color:var(--text);
    font-family:'Rajdhani',sans-serif; font-size:15px; font-weight:600; outline:none;
    transition:border-color .2s, box-shadow .2s;
  }
  input::placeholder { color:var(--muted); font-weight:400; }
  input:focus { border-color:var(--fire1); box-shadow:0 0 0 3px rgba(255,107,0,0.12); }
  .mono { font-family:'Share Tech Mono',monospace; font-size:14px; letter-spacing:1px; }

  .btn {
    padding:13px 24px; border-radius:11px; border:none; cursor:pointer;
    font-family:'Bebas Neue',sans-serif; font-size:17px; letter-spacing:2px;
    transition:opacity .2s, transform .15s;
  }
  .btn:hover { opacity:.88; transform:translateY(-1px); }
  .btn-fire { background:linear-gradient(135deg,var(--fire1),var(--fire2)); color:#fff; box-shadow:0 4px 18px rgba(255,107,0,0.3); }
  .btn-sm {
    padding:7px 14px; border-radius:8px; border:none; cursor:pointer;
    font-family:'Rajdhani',sans-serif; font-size:13px; font-weight:700; letter-spacing:1px;
    transition:all .2s;
  }
  .btn-copy { background:rgba(255,179,0,0.12); border:1px solid rgba(255,179,0,0.3); color:var(--fire3); }
  .btn-copy:hover { background:rgba(255,179,0,0.25); }
  .btn-del { background:rgba(204,34,0,0.12); border:1px solid rgba(204,34,0,0.25); color:#FF5533; }
  .btn-del:hover { background:rgba(204,34,0,0.28); }

  /* Table */
  .mac-table { display:flex; flex-direction:column; gap:10px; }
  .mac-row {
    background:var(--card); border:1px solid var(--border); border-radius:13px;
    padding:14px 18px; display:grid;
    grid-template-columns:190px 1fr auto;
    gap:14px; align-items:center;
    animation:slideIn .22s ease;
  }
  .mac-row:hover { border-color:rgba(255,107,0,0.45); background:rgba(255,107,0,0.09); }
  @keyframes slideIn { from{opacity:0;transform:translateY(-6px)} to{opacity:1;transform:none} }
  @media(max-width:620px){ .mac-row { grid-template-columns:1fr; } }

  .mac-addr { font-family:'Share Tech Mono',monospace; font-size:17px; color:var(--fire1); letter-spacing:2px; }
  .mac-name { font-size:15px; font-weight:700; color:var(--text); }
  .mac-url { font-family:'Share Tech Mono',monospace; font-size:11px; color:var(--muted); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .mac-actions { display:flex; gap:8px; justify-content:flex-end; }

  .empty { text-align:center; padding:40px; color:var(--muted); font-size:15px; border:1px dashed rgba(255,107,0,0.15); border-radius:13px; }

  .toast {
    position:fixed; bottom:28px; left:50%; transform:translateX(-50%) translateY(80px);
    background:linear-gradient(135deg,var(--fire1),var(--fire2)); color:#fff;
    padding:11px 28px; border-radius:30px;
    font-family:'Rajdhani',sans-serif; font-size:15px; font-weight:700; letter-spacing:1px;
    box-shadow:0 8px 28px rgba(255,107,0,0.4); transition:transform .3s cubic-bezier(.175,.885,.32,1.275); z-index:999;
  }
  .toast.show { transform:translateX(-50%) translateY(0); }
</style>
</head>
<body>
<div class="wrap">

  <header>
    <div style="font-size:44px;margin-bottom:8px;">🔥</div>
    <h1>FENIX TV</h1>
    <div class="subtitle">Panel de gestión MAC → Lista</div>
  </header>

  <!-- Admin key -->
  <div class="admin-bar">
    <label>🔑 ADMIN KEY</label>
    <input type="password" id="adminKey" value="admin1234" placeholder="Clave de administrador">
  </div>

  <!-- Asignar lista a MAC -->
  <div class="section-title">➕ Asignar Lista a MAC</div>
  <div class="form-card">
    <div class="fields">
      <input type="text" id="inMAC" class="mono" placeholder="AA:BB:CC:DD:EE:FF" maxlength="17">
      <input type="text" id="inName" placeholder="Nombre del cliente (opcional)">
    </div>
    <div style="margin-bottom:14px;">
      <input type="text" id="inURL" class="mono" placeholder="http://servidor:puerto/get.php?username=XXX&password=XXX&type=m3u_plus" style="font-size:13px;">
    </div>
    <button class="btn btn-fire" onclick="asignarMAC()">💾 GUARDAR ASIGNACIÓN</button>
  </div>

  <!-- Lista de MACs -->
  <div class="section-title">📋 MACs Registradas</div>
  <div id="macList"><div class="empty">Cargando...</div></div>

</div>

<div class="toast" id="toast"></div>

<script>
  const API = '';  // mismo origen

  function adminKey() { return document.getElementById('adminKey').value.trim(); }
  function headers() { return { 'Content-Type':'application/json', 'X-Admin-Key': adminKey() }; }

  // ── Cargar lista ─────────────────────────────────
  async function cargarMACs() {
    try {
      const r = await fetch(API + '/api/mac', { headers: headers() });
      if (r.status === 403) { toast('⚠️ Clave admin incorrecta'); return; }
      const data = await r.json();
      renderMACs(Array.isArray(data) ? data : []);
    } catch(e) { toast('❌ Error al conectar'); }
  }

  function renderMACs(list) {
    const cont = document.getElementById('macList');
    if (!list.length) {
      cont.innerHTML = '<div class="empty">No hay MACs registradas todavía.</div>';
      return;
    }
    cont.innerHTML = '<div class="mac-table">' + list.map(function(m) {
      return '<div class="mac-row">'
        + '<div><div class="mac-addr">' + esc(m.mac) + '</div>'
        + (m.name ? '<div class="mac-name">' + esc(m.name) + '</div>' : '')
        + '</div>'
        + '<div class="mac-url" title="' + esc(m.url) + '">' + esc(m.url) + '</div>'
        + '<div class="mac-actions">'
        + '<button class="btn-sm btn-copy" onclick="copiar(\'' + escA(m.url) + '\')">📋 URL</button>'
        + '<button class="btn-sm btn-del" onclick="eliminarMAC(\'' + escA(m.mac) + '\')">✕</button>'
        + '</div>'
        + '</div>';
    }).join('') + '</div>';
  }

  // ── Asignar ──────────────────────────────────────
  async function asignarMAC() {
    const mac  = document.getElementById('inMAC').value.trim();
    const name = document.getElementById('inName').value.trim();
    const url  = document.getElementById('inURL').value.trim();
    if (!mac || !url) { toast('⚠️ Ingresá la MAC y la URL'); return; }
    try {
      const r = await fetch(API + '/api/mac', {
        method: 'POST', headers: headers(),
        body: JSON.stringify({ mac, name, url })
      });
      if (r.status === 403) { toast('⚠️ Clave admin incorrecta'); return; }
      const d = await r.json();
      if (d.success) {
        toast('✅ MAC asignada correctamente');
        document.getElementById('inMAC').value = '';
        document.getElementById('inName').value = '';
        document.getElementById('inURL').value = '';
        cargarMACs();
      } else { toast('❌ ' + (d.error || 'Error')); }
    } catch(e) { toast('❌ Error al guardar'); }
  }

  // ── Eliminar ─────────────────────────────────────
  async function eliminarMAC(mac) {
    if (!confirm('¿Eliminar la MAC ' + mac + '?')) return;
    try {
      const r = await fetch(API + '/api/mac/' + encodeURIComponent(mac), {
        method: 'DELETE', headers: headers()
      });
      const d = await r.json();
      if (d.success) { toast('🗑️ Eliminada'); cargarMACs(); }
      else toast('❌ ' + (d.error || 'Error'));
    } catch(e) { toast('❌ Error'); }
  }

  function copiar(url) {
    navigator.clipboard.writeText(url).then(function(){ toast('✅ URL copiada'); });
  }

  function esc(s) {
    return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
  function escA(s) { return String(s||'').replace(/'/g,"\\'"); }

  var toastT;
  function toast(msg) {
    var t = document.getElementById('toast');
    t.textContent = msg; t.classList.add('show');
    clearTimeout(toastT);
    toastT = setTimeout(function(){ t.classList.remove('show'); }, 2800);
  }

  // Recargar al cambiar la clave
  document.getElementById('adminKey').addEventListener('change', cargarMACs);

  cargarMACs();
</script>
</body>
</html>
